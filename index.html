<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Honorários – Contabilidade Daymar</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f0e8;--bg2:#ffffff;--bg3:#f0e8d8;--border:#ddd0b8;--border2:#c0a070;--gold:#8b5e20;--gold2:#7a4e18;--text:#2a1a08;--text2:#5a3e28;--text3:#9a8060}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
.header{background:linear-gradient(135deg,#5c1010 0%,#3d0808 60%,#4a1500 100%);border-bottom:2px solid #c9a84c;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:64px;gap:12px;flex-wrap:wrap}
.header-brand{display:flex;align-items:center;gap:14px}
.logo-box{width:40px;height:40px;border:1.5px solid #c9a84c;border-radius:8px;display:flex;align-items:center;justify-content:center;background:rgba(201,168,76,.15)}
.logo-box i{font-size:20px;color:#c9a84c}
.brand-name{font-size:17px;font-weight:700;color:#e8c97a;letter-spacing:.02em}
.brand-sub{font-size:11px;color:#c9a84c;opacity:.8;margin-top:1px}
.header-right{display:flex;align-items:center;gap:10px}
.badge-sync{font-size:12px;padding:5px 12px;border-radius:100px;background:rgba(255,255,255,.1);border:1px solid rgba(201,168,76,.3);display:flex;align-items:center;gap:6px;color:#c9a84c}
.badge-sync.ok{background:rgba(16,185,129,.15);border-color:rgba(16,185,129,.4);color:#10b981}
.badge-sync.err{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.4);color:#ef4444}
.container{max-width:1200px;margin:0 auto;padding:24px 16px;flex:1}
.metrics{display:flex;gap:12px;margin-bottom:24px;overflow-x:auto;padding-bottom:4px}
.mc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 20px;position:relative;overflow:hidden;flex:1;min-width:140px}
.mc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#c9a84c,#e8c97a)}
.mc.c-green::before{background:linear-gradient(90deg,#059669,#10b981)}
.mc.c-red::before{background:linear-gradient(90deg,#dc2626,#ef4444)}
.mc.c-gray::before{background:linear-gradient(90deg,#9a8060,#c0a070)}
.mc-l{font-size:11px;color:var(--text3);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.mc-v{font-size:20px;font-weight:700;color:var(--text)}
.mc-v.gold{color:var(--gold)}.mc-v.green{color:#059669}.mc-v.red{color:#dc2626}.mc-v.amber{color:#b45309}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.tabs{display:flex;gap:2px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:3px}
.tab{padding:7px 18px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text3);transition:all .15s;font-family:inherit}
.tab.on{background:#5c1010;color:#e8c97a;border:1px solid #c9a84c}
.tab:hover:not(.on){color:var(--text2);background:var(--bg2)}
.btn{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s;font-family:inherit}
.btn:hover{background:var(--bg3);border-color:var(--border2)}
.btn-primary{background:linear-gradient(135deg,#5c1010,#7a1818);color:#e8c97a;border:1px solid #c9a84c}
.btn-primary:hover{background:linear-gradient(135deg,#7a1818,#9a2020)}
.btn-danger{color:#dc2626;border-color:#fca5a5}.btn-danger:hover{background:#fef2f2}
.btn-sm{padding:5px 10px;font-size:12px}
.search-wrap{margin-bottom:14px}
.search-wrap input{width:100%;max-width:420px;padding:9px 14px;border:1px solid var(--border);border-radius:9px;font-size:13px;background:var(--bg2);color:var(--text);font-family:inherit;outline:none;transition:border-color .15s;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.search-wrap input:focus{border-color:#c9a84c;box-shadow:0 0 0 3px rgba(201,168,76,.12)}
.search-wrap input::placeholder{color:var(--text3)}
.group-block{margin-bottom:1.75rem}
.group-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:10px;transition:border-color .2s,box-shadow .2s;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card:hover{border-color:var(--border2);box-shadow:0 4px 16px rgba(139,94,32,.1)}
.card-head{display:flex;align-items:flex-start;gap:12px}
.avatar{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#5c1010,#8b1a1a);border:1px solid #c9a84c;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#e8c97a;flex-shrink:0}
.card-info{flex:1;min-width:0}
.card-nome{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px}
.card-razao{font-size:12px;color:var(--text3);margin-bottom:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{font-size:11px;padding:2px 8px;border-radius:100px;background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
.tag-regime{background:#fef3c7;color:#92400e;border-color:#fde68a}
.tag-grupo{background:#ede9fe;color:#5b21b6;border-color:#ddd6fe}
.card-actions{display:flex;gap:6px;flex-shrink:0}
.card-vals{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.val-l{font-size:11px;color:var(--text3);margin-bottom:3px;font-weight:500}
.val-v{font-size:13px;font-weight:700;color:var(--text)}
.val-v.gold{color:var(--gold)}.val-v.green{color:#059669}.val-v.amber{color:#b45309}
.pix-line{margin-top:10px;font-size:12px;color:var(--text3);display:flex;align-items:center;gap:6px}
.obs-line{margin-top:10px;font-size:12px;color:var(--text3);border-top:1px solid var(--border);padding-top:10px;line-height:1.5}

/* ── MESES ── */
.meses-section{margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.meses-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;cursor:pointer;user-select:none}
.meses-header-left{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:var(--text2)}
.meses-toggle{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px}
.meses-grid{display:flex;flex-wrap:wrap;gap:6px}
.mes-chip{display:inline-flex;flex-direction:column;align-items:center;padding:6px 10px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid;transition:all .15s;min-width:54px;user-select:none;position:relative}
.mes-chip:hover{transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,.12)}
.mes-chip:active{transform:scale(.96)}
.mes-chip .mes-nome{font-size:10px;font-weight:500;margin-bottom:2px;opacity:.8}
.mes-chip .mes-ano{font-size:9px;opacity:.6}
.mes-chip .mes-ico{font-size:13px;margin-bottom:1px}

/* status dos chips */
.chip-pendente{background:#fef9f0;border-color:#f0c060;color:#92400e}
.chip-pago{background:#d1fae5;border-color:#34d399;color:#065f46}
.chip-vencido{background:#fee2e2;border-color:#f87171;color:#991b1b}
.chip-futuro{background:#f3f4f6;border-color:#d1d5db;color:#9ca3af;cursor:default}
.chip-futuro:hover{transform:none;box-shadow:none}
.chip-atual{box-shadow:0 0 0 2px #c9a84c}

.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3)}
.leg-dot{width:10px;height:10px;border-radius:3px}

/* cobrança badge */
.cobranca-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:100px;background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;font-weight:600}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem;backdrop-filter:blur(3px)}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:1.5rem;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.2)}
.modal h3{font-size:16px;font-weight:600;color:var(--gold);margin-bottom:1.25rem;display:flex;align-items:center;gap:8px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.f{display:flex;flex-direction:column;gap:5px}
.f label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.f input,.f select,.f textarea{padding:9px 11px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;color:var(--text);background:var(--bg);outline:none;transition:border-color .15s}
.f input:focus,.f select:focus,.f textarea:focus{border-color:#c9a84c;box-shadow:0 0 0 3px rgba(201,168,76,.1)}
.f textarea{resize:vertical;min-height:60px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border)}

/* RESUMO */
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.rc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.rc h4{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:12px;display:flex;align-items:center;gap:7px}
.rc h4 i{color:var(--gold)}
.rr{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2)}
.rr:last-child{border:none}
.rr strong{font-weight:700;color:var(--text)}
.reg-chips{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-top:8px}
.reg-chip{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 12px}
.reg-chip-l{font-size:11px;color:var(--text3);margin-bottom:3px}
.reg-chip-v{font-size:13px;font-weight:700;color:var(--gold)}
.footer{background:linear-gradient(135deg,#5c1010,#3d0808);border-top:2px solid #c9a84c;padding:18px 24px;text-align:center}
.footer-contact{display:flex;justify-content:center;flex-wrap:wrap;gap:20px;margin-bottom:8px}
.footer-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#c9a84c}
.footer-brand{font-size:11px;color:#c9a84c;opacity:.6}
.toast{position:fixed;bottom:24px;right:24px;padding:11px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;border:1px solid}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:#f0fdf4;border-color:#86efac;color:#15803d}
.toast.err{background:#fef2f2;border-color:#fca5a5;color:#dc2626}
.gold-line{height:1px;background:linear-gradient(90deg,transparent,#c9a84c,transparent);margin:0 0 24px;opacity:.4}
.empty{text-align:center;padding:4rem 1rem;color:var(--text3)}
.empty i{font-size:40px;display:block;margin-bottom:12px;opacity:.3}
.empty p{margin-bottom:1.5rem;font-size:14px}
@media(max-width:700px){.fg{grid-template-columns:1fr}.rgrid{grid-template-columns:1fr}.header{height:auto;padding:12px 16px}}
</style>
</head>
<body>

<div class="header">
  <div class="header-brand">
    <div class="logo-box"><i class="ti ti-report-money"></i></div>
    <div>
      <div class="brand-name">CONTABILIDADE DAYMAR</div>
      <div class="brand-sub">Controle de Honorários</div>
    </div>
  </div>
  <div class="header-right">
    <span class="badge-sync" id="badge-sync"><i class="ti ti-cloud"></i> <span id="sync-txt">Carregando...</span></span>
    <button class="btn btn-primary" onclick="openModal(null)"><i class="ti ti-plus"></i> Novo cliente</button>
  </div>
</div>

<div class="container">
  <div class="gold-line"></div>
  <div class="metrics" id="metrics"></div>
  <div class="toolbar">
    <div class="tabs">
      <button class="tab on" id="tab-clientes" onclick="setTab('clientes')"><i class="ti ti-users" style="font-size:14px"></i> Clientes</button>
      <button class="tab" id="tab-resumo" onclick="setTab('resumo')"><i class="ti ti-chart-bar" style="font-size:14px"></i> Resumo</button>
    </div>
  </div>
  <div id="content"></div>
</div>

<div class="footer">
  <div class="footer-contact">
    <span class="footer-item"><i class="ti ti-phone"></i> (32) 9 9990-7135 / (32) 3413-0053</span>
    <span class="footer-item"><i class="ti ti-mail"></i> contabilidade.daymar@hotmail.com</span>
    <span class="footer-item"><i class="ti ti-brand-instagram"></i> @anaamayrink</span>
  </div>
  <div class="footer-brand">© Contabilidade Daymar · Compromisso com o seu sucesso</div>
</div>

<div class="overlay" id="overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const DIA_VENC = 5;
const MESES_NOME = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

let clientes = [], pagamentos = {}, tab = 'clientes', search = '', editId = null;
const REGIMES = ['Simples Nacional','Lucro Presumido','Lucro Real','MEI','Outro'];
const STATUS  = ['Pendente','Pago','Atrasado'];

// retorna "2025-06" para Date
function mesKey(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }

// gera últimos 12 meses até o atual
function ultimos12(){
  const hoje = new Date();
  const lista = [];
  for(let i=11; i>=0; i--){
    const d = new Date(hoje.getFullYear(), hoje.getMonth()-i, 1);
    lista.push({ key: mesKey(d), nome: MESES_NOME[d.getMonth()], ano: d.getFullYear(), mes: d.getMonth(), ano4: d.getFullYear() });
  }
  return lista;
}

function statusMes(clienteId, mesInfo){
  const hoje = new Date();
  const atualKey = mesKey(hoje);
  const pag = (pagamentos[clienteId]||[]).find(p => p.mes === mesInfo.key);
  if(pag) return pag.status; // 'Pago'
  // futuro
  if(mesInfo.key > atualKey) return 'futuro';
  // mes atual: vencido só após dia 5
  if(mesInfo.key === atualKey){
    return hoje.getDate() > DIA_VENC ? 'vencido' : 'pendente';
  }
  // meses passados sem pagamento = vencido
  return 'vencido';
}

function fmt(v){if(!v&&v!==0)return'—';return'R$ '+parseFloat(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function ini(n){return((n||'?').split(' ').slice(0,2).map(w=>w[0]).join('')).toUpperCase();}
function total(c){return(parseFloat(c.honorario)||0)+(parseFloat(c.apice)||0);}
function dec(c){return c.decimo==='Sim'?(parseFloat(c.honorario)||0)/12:0;}
function grupos(list){const m={};list.forEach(c=>{const g=c.grupo||'Sem grupo';if(!m[g])m[g]=[];m[g].push(c);});return m;}

function toast(msg,ok=true){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+(ok?'ok':'err');setTimeout(()=>t.className='toast',3000);}
function syncBadge(s){const b=document.getElementById('badge-sync'),t=document.getElementById('sync-txt');b.className='badge-sync'+(s==='ok'?' ok':s==='err'?' err':'');t.textContent=s==='ok'?'Sincronizado':s==='err'?'Erro de conexão':'Sincronizando...';}

async function loadData(){
  syncBadge('loading');
  try{
    const [rc, rp] = await Promise.all([
      fetch('/api/clientes').then(r=>r.json()),
      fetch('/api/pagamentos').then(r=>r.json())
    ]);
    clientes = Array.isArray(rc) ? rc : [];
    // indexar pagamentos por cliente_id
    pagamentos = {};
    if(Array.isArray(rp)) rp.forEach(p=>{
      if(!pagamentos[p.cliente_id]) pagamentos[p.cliente_id]=[];
      pagamentos[p.cliente_id].push(p);
    });
    syncBadge('ok');
  }catch{syncBadge('err');toast('Erro ao carregar dados',false);}
  render();
}

async function apiPost(url,b){const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});return r.json();}
async function apiPut(b){const r=await fetch('/api/clientes',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});return r.json();}
async function apiDelete(id){await fetch('/api/clientes',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})});}

async function toggleMes(clienteId, mesKey, statusAtual){
  // ciclo: vencido/pendente → Pago → volta (deleta)
  if(statusAtual === 'futuro') return;
  syncBadge('loading');
  try{
    if(statusAtual === 'pago'){
      // remove pagamento (volta a pendente/vencido)
      await fetch('/api/pagamentos',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({cliente_id:clienteId,mes:mesKey})});
      if(!pagamentos[clienteId]) pagamentos[clienteId]=[];
      pagamentos[clienteId] = pagamentos[clienteId].filter(p=>p.mes!==mesKey);
    } else {
      // marca como pago
      await apiPost('/api/pagamentos',{cliente_id:clienteId,mes:mesKey,status:'Pago'});
      if(!pagamentos[clienteId]) pagamentos[clienteId]=[];
      pagamentos[clienteId] = pagamentos[clienteId].filter(p=>p.mes!==mesKey);
      pagamentos[clienteId].push({cliente_id:clienteId,mes:mesKey,status:'Pago'});
    }
    syncBadge('ok');
    render();
  }catch{syncBadge('err');toast('Erro ao salvar',false);}
}

function renderMetrics(){
  const hoje = new Date();
  const mesAtual = mesKey(hoje);
  let tm=0,ta=0,pagos=0,pend=0,venc=0;
  clientes.forEach(c=>{
    tm+=total(c);ta+=(parseFloat(c.apice)||0);
    const st = statusMes(c.id, {key:mesAtual, mes:hoje.getMonth(), ano4:hoje.getFullYear()});
    if(st==='pago'||st==='Pago') pagos++;
    else if(st==='vencido') venc++;
    else pend++;
  });
  document.getElementById('metrics').innerHTML=`
    <div class="mc"><div class="mc-l">Total mensal</div><div class="mc-v gold">${fmt(tm)}</div></div>
    <div class="mc"><div class="mc-l">Cons. Ápice</div><div class="mc-v gold">${fmt(ta)}</div></div>
    <div class="mc c-green"><div class="mc-l">Pagos (mês)</div><div class="mc-v green">${pagos}</div></div>
    <div class="mc"><div class="mc-l">Pendentes</div><div class="mc-v amber">${pend}</div></div>
    <div class="mc c-red"><div class="mc-l">Vencidos</div><div class="mc-v red">${venc}</div></div>
    <div class="mc c-gray"><div class="mc-l">Clientes</div><div class="mc-v">${clientes.length}</div></div>`;
}

function renderMeses(c){
  const lista = ultimos12();
  const hoje = new Date();
  const atualKey = mesKey(hoje);
  let vencidos = 0;

  const chips = lista.map(m=>{
    const st = statusMes(c.id, m);
    const isAtual = m.key === atualKey;
    if(st==='vencido') vencidos++;
    const cls = st==='pago'||st==='Pago' ? 'chip-pago' : st==='vencido' ? 'chip-vencido' : st==='futuro' ? 'chip-futuro' : 'chip-pendente';
    const ico = st==='pago'||st==='Pago' ? 'ti-check' : st==='vencido' ? 'ti-alert-circle' : st==='futuro' ? 'ti-clock' : 'ti-circle';
    const title = st==='pago'||st==='Pago' ? 'Pago — clique para desfazer' : st==='vencido' ? 'Vencido — clique para marcar como pago' : st==='futuro' ? 'Mês futuro' : 'Pendente — clique para marcar como pago';
    const onclick = st!=='futuro' ? `toggleMes('${c.id}','${m.key}','${(st==='pago'||st==='Pago')?'pago':'pendente'}')` : '';
    return `<div class="mes-chip ${cls}${isAtual?' chip-atual':''}" onclick="${onclick}" title="${title}">
      <i class="ti ${ico} mes-ico"></i>
      <span class="mes-nome">${m.nome}</span>
      <span class="mes-ano">${m.ano}</span>
    </div>`;
  }).join('');

  const vencBadge = vencidos > 0 ? `<span class="cobranca-badge"><i class="ti ti-alert-triangle" style="font-size:12px"></i> ${vencidos} vencido${vencidos>1?'s':''}</span>` : '';

  return `<div class="meses-section">
    <div class="meses-header">
      <div class="meses-header-left">
        <i class="ti ti-calendar-month" style="color:var(--gold);font-size:14px"></i>
        Controle de pagamentos ${vencBadge}
      </div>
      <div class="meses-toggle" style="font-size:11px;color:var(--text3)">
        <i class="ti ti-info-circle" style="font-size:12px"></i> Clique no mês para marcar como pago
      </div>
    </div>
    <div class="meses-grid">${chips}</div>
  </div>`;
}

function renderClientes(){
  const fil=clientes.filter(c=>{if(!search)return true;const q=search.toLowerCase();return(c.nome||'').toLowerCase().includes(q)||(c.razao||'').toLowerCase().includes(q)||(c.grupo||'').toLowerCase().includes(q);});
  const gr=grupos(fil);const keys=Object.keys(gr);
  if(keys.length===0)return`<div class="empty"><i class="ti ti-users"></i><p>Nenhum cliente cadastrado ainda.</p><button class="btn btn-primary" onclick="openModal(null)"><i class="ti ti-plus"></i> Adicionar primeiro cliente</button></div>`;
  return keys.map(g=>`<div class="group-block"><div class="group-title"><i class="ti ti-building" style="font-size:12px;color:var(--gold)"></i>${g} <span style="opacity:.5;font-weight:400">(${gr[g].length})</span></div>${gr[g].map(c=>renderCard(c)).join('')}</div>`).join('');
}

function renderCard(c){
  const t=total(c),d=dec(c);
  return`<div class="card">
    <div class="card-head">
      <div class="avatar">${ini(c.nome)}</div>
      <div class="card-info">
        <div class="card-nome">${c.nome||'—'}</div>
        <div class="card-razao">${c.razao||'—'}</div>
        <div class="tags">
          ${c.regime?`<span class="tag tag-regime">${c.regime}</span>`:''}
          ${c.grupo&&c.grupo!=='Sem grupo'?`<span class="tag tag-grupo"><i class="ti ti-building" style="font-size:10px"></i> ${c.grupo}</span>`:''}
        </div>
      </div>
      <div class="card-actions">
        <button class="btn btn-sm" onclick="openModal('${c.id}')" title="Editar"><i class="ti ti-edit"></i></button>
        <button class="btn btn-sm btn-danger" onclick="excluir('${c.id}','${(c.nome||'').replace(/'/g,'')}')"><i class="ti ti-trash"></i></button>
      </div>
    </div>
    <div class="card-vals">
      <div><div class="val-l">Honorário</div><div class="val-v gold">${fmt(c.honorario)}</div></div>
      ${c.apice?`<div><div class="val-l">Cons. Ápice</div><div class="val-v amber">${fmt(c.apice)}</div></div>`:''}
      <div><div class="val-l">Total mensal</div><div class="val-v green">${fmt(t)}</div></div>
      ${d>0?`<div><div class="val-l">13° (mensal)</div><div class="val-v">${fmt(d)}</div></div>`:''}
      ${c.pix?`<div><div class="val-l">Chave PIX</div><div class="val-v" style="font-size:12px;font-weight:500">${c.pix}</div></div>`:''}
    </div>
    ${renderMeses(c)}
    ${c.obs?`<div class="obs-line">${c.obs}</div>`:''}
  </div>`;
}

function renderResumo(){
  const tHon=clientes.reduce((s,c)=>s+(parseFloat(c.honorario)||0),0);
  const tAp=clientes.reduce((s,c)=>s+(parseFloat(c.apice)||0),0);
  const tDec=clientes.reduce((s,c)=>s+dec(c),0);
  const byReg={};const byGrp=grupos(clientes);
  const hoje=new Date();const mesAtual=mesKey(hoje);
  let recebido=0,aReceber=0,vencidoVal=0;
  clientes.forEach(c=>{
    const st=statusMes(c.id,{key:mesAtual,mes:hoje.getMonth(),ano4:hoje.getFullYear()});
    const rg=c.regime||'Sem regime';byReg[rg]=(byReg[rg]||0)+(parseFloat(c.honorario)||0);
    if(st==='pago'||st==='Pago') recebido+=total(c);
    else if(st==='vencido') vencidoVal+=total(c);
    else aReceber+=total(c);
  });
  return`
  <div class="rgrid">
    <div class="rc"><h4><i class="ti ti-calculator"></i> Totais mensais</h4>
      <div class="rr"><span>Honorários</span><span style="color:var(--gold);font-weight:700">${fmt(tHon)}</span></div>
      <div class="rr"><span>Consultoria Ápice</span><span style="color:var(--gold);font-weight:700">${fmt(tAp)}</span></div>
      <div class="rr"><strong>Total mensal</strong><strong style="color:#059669">${fmt(tHon+tAp)}</strong></div>
    </div>
    <div class="rc"><h4><i class="ti ti-gift"></i> 13° salário</h4>
      <div class="rr"><span>Clientes com 13°</span><strong>${clientes.filter(c=>c.decimo==='Sim').length}</strong></div>
      <div class="rr"><span>Estimativa anual</span><strong style="color:var(--gold)">${fmt(tDec*12)}</strong></div>
    </div>
  </div>
  <div class="rc" style="margin-bottom:12px"><h4><i class="ti ti-circle-check"></i> Situação do mês atual</h4>
    <div class="rr"><span><span class="tag" style="background:#d1fae5;color:#065f46;border-color:#a7f3d0">Recebido</span></span><span style="color:#059669;font-weight:700">${fmt(recebido)}</span></div>
    <div class="rr"><span><span class="tag" style="background:#fef3c7;color:#92400e;border-color:#fde68a">A receber</span></span><span style="color:#b45309;font-weight:700">${fmt(aReceber)}</span></div>
    <div class="rr"><span><span class="tag" style="background:#fee2e2;color:#991b1b;border-color:#fca5a5">Vencido</span></span><span style="color:#dc2626;font-weight:700">${fmt(vencidoVal)}</span></div>
  </div>
  <div class="rgrid">
    <div class="rc"><h4><i class="ti ti-building-community"></i> Por grupo</h4>
      ${Object.keys(byGrp).map(g=>{const t=byGrp[g].reduce((s,c)=>s+total(c),0);return`<div class="rr"><span>${g} <span style="color:var(--text3);font-size:11px">(${byGrp[g].length})</span></span><span style="color:var(--gold)">${fmt(t)}</span></div>`;}).join('')||'<div style="color:var(--text3);font-size:13px;padding:6px 0">Nenhum dado</div>'}
    </div>
    <div class="rc"><h4><i class="ti ti-chart-pie"></i> Por regime tributário</h4>
      <div class="reg-chips">${Object.keys(byReg).map(r=>`<div class="reg-chip"><div class="reg-chip-l">${r}</div><div class="reg-chip-v">${fmt(byReg[r])}</div></div>`).join('')||'<div style="color:var(--text3);font-size:13px">Nenhum dado</div>'}</div>
    </div>
  </div>`;
}

function render(){
  renderMetrics();
  const c=document.getElementById('content');
  if(tab==='clientes'){c.innerHTML=`<div class="search-wrap"><input type="text" placeholder="Buscar por nome, empresa ou grupo..." value="${search}" oninput="search=this.value;render()"></div>${renderClientes()}`;}
  else{c.innerHTML=renderResumo();}
}

function setTab(t){tab=t;document.getElementById('tab-clientes').className='tab'+(t==='clientes'?' on':'');document.getElementById('tab-resumo').className='tab'+(t==='resumo'?' on':'');render();}

function openModal(id){
  editId=id;const c=id?clientes.find(x=>x.id===id)||{}:{};const isEdit=!!id;
  const gList=[...new Set(clientes.map(x=>x.grupo).filter(Boolean))];
  document.getElementById('modal').innerHTML=`<h3><i class="ti ti-${isEdit?'edit':'user-plus'}"></i> ${isEdit?'Editar cliente':'Novo cliente'}</h3><div class="fg"><div class="f"><label>Nome do cliente *</label><input id="f_nome" type="text" value="${c.nome||''}" placeholder="Ex: João Silva"></div><div class="f"><label>Razão social / empresa *</label><input id="f_razao" type="text" value="${c.razao||''}" placeholder="Ex: Silva LTDA"></div><div class="f"><label>Grupo / holding</label><input id="f_grupo" type="text" value="${c.grupo||''}" placeholder="Ex: Grupo Silva" list="glist"><datalist id="glist">${gList.map(g=>`<option value="${g}">`).join('')}</datalist></div><div class="f"><label>Regime tributário</label><select id="f_reg"><option value="">Selecione</option>${REGIMES.map(r=>`<option${c.regime===r?' selected':''}>${r}</option>`).join('')}</select></div><div class="f"><label>Honorário mensal (R$)</label><input id="f_hon" type="number" step="0.01" min="0" value="${c.honorario||''}" placeholder="0,00"></div><div class="f"><label>Consultoria Ápice (R$)</label><input id="f_ap" type="number" step="0.01" min="0" value="${c.apice||''}" placeholder="0,00"></div><div class="f"><label>Paga 13°?</label><select id="f_dec"><option value="Não"${c.decimo!=='Sim'?' selected':''}>Não</option><option value="Sim"${c.decimo==='Sim'?' selected':''}>Sim</option></select></div><div class="f"><label>Status pagamento atual</label><select id="f_st"><option>Pendente</option><option${c.status==='Pago'?' selected':''}>Pago</option><option${c.status==='Atrasado'?' selected':''}>Atrasado</option></select></div><div class="f" style="grid-column:1/-1"><label>Chave PIX</label><input id="f_pix" type="text" value="${c.pix||''}" placeholder="CPF, CNPJ, e-mail, telefone ou chave aleatória"></div><div class="f" style="grid-column:1/-1"><label>Observações</label><textarea id="f_obs">${c.obs||''}</textarea></div></div><div class="modal-footer"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="salvar()"><i class="ti ti-device-floppy"></i> ${isEdit?'Salvar alterações':'Cadastrar cliente'}</button></div>`;
  document.getElementById('overlay').style.display='flex';
  document.getElementById('f_nome').focus();
}
function closeModal(){document.getElementById('overlay').style.display='none';editId=null;}

async function salvar(){
  const nome=(document.getElementById('f_nome').value||'').trim();
  const razao=(document.getElementById('f_razao').value||'').trim();
  if(!nome||!razao){alert('Preencha o nome e a razão social.');return;}
  const d={nome,razao,grupo:document.getElementById('f_grupo').value.trim(),regime:document.getElementById('f_reg').value,honorario:document.getElementById('f_hon').value||null,apice:document.getElementById('f_ap').value||null,decimo:document.getElementById('f_dec').value,status:document.getElementById('f_st').value,pix:document.getElementById('f_pix').value.trim(),obs:document.getElementById('f_obs').value.trim()};
  syncBadge('loading');
  try{
    if(editId){await apiPut({id:editId,...d});toast('Cliente atualizado!');}
    else{await apiPost('/api/clientes',d);toast('Cliente cadastrado!');}
    closeModal();await loadData();
  }catch{syncBadge('err');toast('Erro ao salvar',false);}
}

async function excluir(id,nome){
  if(!confirm(`Excluir "${nome}"?`))return;
  syncBadge('loading');
  try{await apiDelete(id);toast('Cliente excluído');await loadData();}
  catch{syncBadge('err');toast('Erro ao excluir',false);}
}

loadData();
</script>
</body>
</html>
